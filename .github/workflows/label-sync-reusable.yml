# ラベル同期 Reusable Workflow
#
# 依存ファイル:
#   - hasegawa496/.github/.github/labels.yml（ラベル定義）
#
# 使用方法:
#   hasegawa496/.github/.github/workflows/label-sync.yml を参照

name: Label Sync (Reusable)

on:
  workflow_call:

permissions:
  contents: read
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v7
        with:
          repository: hasegawa496/.github
          path: .github-repo

      - name: Sync labels
        uses: EndBug/label-sync@52074158190acb45f3077f9099fea818aa43f97a # v2
        with:
          config-file: .github-repo/.github/labels.yml
          delete-other-labels: true
