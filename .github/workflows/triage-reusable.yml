# Issue を Project に追加し、優先度/Size を自動設定する Reusable Workflow
#
# 目的:
#   - Issue 作成時に Project（Projects v2）へ自動追加
#   - Issue フォームの入力内容から Project のフィールドを更新（優先度/Size）
#
# 前提:
#   - Projects v2 に以下のフィールドが存在すること
#       - Priority（Single select）
#       - Size（Single select: XS/S/M/L/XL）
#   - Project 更新には `project` 権限を持つトークン（PAT など）が必要になる場合があります
#
# 使い方:
#   - workflow-templates/triage.yml を各リポジトリへコピーして利用します

name: Triage (Reusable)

on:
  workflow_call:
    inputs:
      project_owner:
        description: Project の owner（ユーザー名/組織名）
        required: false
        type: string
      project_number:
        description: Project の番号
        required: false
        type: number
        default: 12
      priority_field_name:
        description: 優先度フィールド名（Single select）
        required: false
        type: string
        default: Priority
      size_field_name:
        description: Size フィールド名（Single select）
        required: false
        type: string
        default: Size
    secrets:
      project_token:
        description: Projects v2 更新用トークン（PAT など）
        required: false

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Project へ追加しフィールドを更新
        env:
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          PROJECT_OWNER: ${{ inputs.project_owner || github.repository_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          PRIORITY_FIELD_NAME: ${{ inputs.priority_field_name }}
          SIZE_FIELD_NAME: ${{ inputs.size_field_name }}
          PROJECT_TOKEN: ${{ secrets.project_token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          comment() {
            local body="$1"
            body="${body//\\n/$'\n'}"
            GH_TOKEN="${GITHUB_TOKEN}" gh api "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -f body="$body" >/dev/null || true
          }

          issue_json="$(GH_TOKEN="${GITHUB_TOKEN}" gh api "repos/${REPO}/issues/${ISSUE_NUMBER}")"
          issue_title="$(jq -r '.title // ""' <<<"$issue_json")"
          issue_body="$(jq -r '.body // ""' <<<"$issue_json")"
          issue_url="$(jq -r '.html_url // ""' <<<"$issue_json")"

          extract_first_line_under_heading() {
            local heading="$1"
            awk -v h="### ${heading}" '
              $0==h {matched=1; next}
              matched && /^### / {exit}
              matched {
                if ($0 ~ /^[[:space:]]*$/) next
                print $0
                exit
              }
            ' <<<"$issue_body"
          }

          priority_opt="$(extract_first_line_under_heading "優先度")"
          size_opt="$(extract_first_line_under_heading "Size")"

          # 簡易正規化（Issue Form のフル表記「P1: 高」等も短縮表記も、
          # Project の選択肢名である P0〜P3 に正規化する）
          case "$priority_opt" in
            P0*) priority_opt="P0" ;;
            P1*) priority_opt="P1" ;;
            P2*) priority_opt="P2" ;;
            P3*) priority_opt="P3" ;;
          esac

          # 簡易正規化（小文字入力を許容）
          case "${size_opt^^}" in
            XS|S|M|L|XL) size_opt="${size_opt^^}" ;;
          esac

          if [[ -z "${PROJECT_TOKEN:-}" ]]; then
            comment "Projects v2 を更新するためのトークンが未設定です。PROJECT_TOKEN（Project への書き込み権限）を設定してください。\n\n- 取得値: 優先度=${priority_opt}, Size=${size_opt}\n\nIssue: ${issue_url}"
            exit 0
          fi

          project_query='
            query($owner:String!, $number:Int!){
              user(login:$owner){
                projectV2(number:$number){
                  id
                  title
                  fields(first:100){
                    nodes{
                      ... on ProjectV2FieldCommon { id name dataType }
                      ... on ProjectV2SingleSelectField { id name dataType options { id name } }
                    }
                  }
                }
              }
              organization(login:$owner){
                projectV2(number:$number){
                  id
                  title
                  fields(first:100){
                    nodes{
                      ... on ProjectV2FieldCommon { id name dataType }
                      ... on ProjectV2SingleSelectField { id name dataType options { id name } }
                    }
                  }
                }
              }
            }'

          # owner が個人アカウントの場合、organization フィールドの解決失敗により
          # graphql の errors が返り gh api graphql が非ゼロ終了するが、
          # data 自体は取得できているため、exit code ではなく取得データの有無で成否判定する。
          project_json="$(GH_TOKEN="${PROJECT_TOKEN}" gh api graphql -f query="$project_query" -F owner="${PROJECT_OWNER}" -F number="${PROJECT_NUMBER}" 2>/dev/null || true)"
          project_obj="$(jq -c '.data.organization.projectV2 // .data.user.projectV2 // empty' <<<"${project_json:-{}}" 2>/dev/null || true)"
          if [[ -z "$project_obj" ]]; then
            comment "Project（${PROJECT_OWNER}/${PROJECT_NUMBER}）の取得に失敗しました。owner/番号が正しいか確認してください。"
            exit 0
          fi

          project_id="$(jq -r '.id' <<<"$project_obj")"
          project_title="$(jq -r '.title' <<<"$project_obj")"

          field_id_by_name() {
            local name="$1"
            jq -r --arg name "$name" '.fields.nodes[] | select(.name==$name) | .id' <<<"$project_obj" | head -n1
          }

          option_id_by_name() {
            local field_name="$1"
            local option_name="$2"
            jq -r --arg field "$field_name" --arg opt "$option_name" '
              .fields.nodes[]
              | select(.name==$field)
              | .options[]?
              | select(.name==$opt)
              | .id
            ' <<<"$project_obj" | head -n1
          }

          existing_item_query='
            query($contentId:ID!){
              node(id:$contentId){
                ... on Issue {
                  projectItems(first:50){
                    nodes { id project { id } }
                  }
                }
              }
            }'
          if ! existing_items_json="$(GH_TOKEN="${PROJECT_TOKEN}" gh api graphql -f query="$existing_item_query" -F contentId="${ISSUE_NODE_ID}" 2>/dev/null)"; then
            comment "Issue の既存 Project アイテム確認に失敗しました（PROJECT_TOKEN の Project アクセス権限が不足している可能性があります）。\n\nIssue: ${issue_url}"
            exit 0
          fi
          item_id="$(jq -r --arg pid "$project_id" '.data.node.projectItems.nodes[]? | select(.project.id==$pid) | .id' <<<"$existing_items_json" | head -n1)"

          if [[ -z "${item_id:-}" ]]; then
            add_item_mutation='
              mutation($projectId:ID!, $contentId:ID!){
                addProjectV2ItemById(input:{projectId:$projectId, contentId:$contentId}){
                  item { id }
                }
              }'
            if ! add_json="$(GH_TOKEN="${PROJECT_TOKEN}" gh api graphql -f query="$add_item_mutation" -F projectId="${project_id}" -F contentId="${ISSUE_NODE_ID}" 2>/dev/null)"; then
              comment "Issue を Project に追加できませんでした（権限不足の可能性があります）。Project: ${PROJECT_OWNER}/${PROJECT_NUMBER}\n\nIssue: ${issue_url}"
              exit 0
            fi
            item_id="$(jq -r '.data.addProjectV2ItemById.item.id // empty' <<<"$add_json")"
          fi

          # Projectへの追加はここまでで完了。優先度/Sizeは互いに独立して扱い、
          # 片方だけ取得できた場合もその1件だけを設定する。
          priority_field_id="$(field_id_by_name "${PRIORITY_FIELD_NAME}")"
          size_field_id="$(field_id_by_name "${SIZE_FIELD_NAME}")"

          update_mutation='
            mutation($projectId:ID!, $itemId:ID!, $fieldId:ID!, $optionId:String!){
              updateProjectV2ItemFieldValue(input:{
                projectId:$projectId,
                itemId:$itemId,
                fieldId:$fieldId,
                value:{ singleSelectOptionId:$optionId }
              }){
                projectV2Item { id }
              }
            }'

          update_field() {
            local field_id="$1"
            local option_id="$2"
            GH_TOKEN="${PROJECT_TOKEN}" gh api graphql -f query="$update_mutation" \
              -F projectId="${project_id}" \
              -F itemId="${item_id}" \
              -F fieldId="${field_id}" \
              -F optionId="${option_id}" >/dev/null
          }

          notes=()

          if [[ -z "${priority_opt:-}" ]]; then
            notes+=("優先度: Issue フォームから取得できませんでした")
          elif [[ -z "${priority_field_id:-}" ]]; then
            notes+=("優先度: Project「${project_title}」に${PRIORITY_FIELD_NAME}フィールドが見つかりません")
          else
            priority_option_id="$(option_id_by_name "${PRIORITY_FIELD_NAME}" "${priority_opt}")"
            if [[ -z "${priority_option_id:-}" ]]; then
              notes+=("優先度=${priority_opt}: Project 側に一致する選択肢がありません")
            elif ! update_field "${priority_field_id}" "${priority_option_id}"; then
              notes+=("優先度=${priority_opt}: フィールド更新に失敗しました（権限不足の可能性があります）")
            fi
          fi

          if [[ -z "${size_opt:-}" ]]; then
            notes+=("Size: Issue フォームから取得できませんでした")
          elif [[ -z "${size_field_id:-}" ]]; then
            notes+=("Size: Project「${project_title}」に${SIZE_FIELD_NAME}フィールドが見つかりません")
          else
            size_option_id="$(option_id_by_name "${SIZE_FIELD_NAME}" "${size_opt}")"
            if [[ -z "${size_option_id:-}" ]]; then
              notes+=("Size=${size_opt}: Project 側に一致する選択肢がありません")
            elif ! update_field "${size_field_id}" "${size_option_id}"; then
              notes+=("Size=${size_opt}: フィールド更新に失敗しました（権限不足の可能性があります）")
            fi
          fi

          if (( ${#notes[@]} > 0 )); then
            note_lines=""
            for note in "${notes[@]}"; do
              note_lines+="- ${note}\n"
            done
            comment "Project「${project_title}」への追加は完了していますが、一部フィールドは自動設定できませんでした。\n\n${note_lines}\nIssue: ${issue_url}"
          fi
