# Dependabot 自動マージ（配布先へコピーして使う workflow）
#
# 使い方:
#   1) `templates/` の配布処理で各リポジトリの
#      `.github/workflows/dependabot-automerge.yml` として配置する
#   2) 待機対象は全リポジトリで `CI` に固定する
#
# 対象:
#   - dependabot が作成した PR に紐づく CI workflow が成功した場合、
#     patch / minor / major の区別なく無条件でマージする

name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    uses: hasegawa496/.github/.github/workflows/dependabot-automerge-reusable.yml@main
    secrets: inherit
