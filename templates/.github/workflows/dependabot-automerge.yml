# Dependabot 自動マージ（配布先へコピーして使う workflow）
#
# 使い方:
#   1) `templates/` の配布処理で各リポジトリの
#      `.github/workflows/dependabot-automerge.yml` として配置する
#   2) 発火用の監視対象は全リポジトリで `CI` に固定する
#
# 対象:
#   - dependabot が作成した PR について、head SHA 上のすべてのチェックが
#     完結し、すべて成功の場合だけ、patch / minor / major の区別なくマージする
#   - マージ可否の判定は Reusable Workflow 側の全チェック確認が担う

name: Dependabot Auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read
  checks: read
  statuses: read

jobs:
  automerge:
    uses: hasegawa496/.github/.github/workflows/dependabot-automerge-reusable.yml@main
    secrets: inherit
